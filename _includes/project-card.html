{% if project.web_url %}
  <div class="col-12 col-md-10 d-flex flex-column flex-justify-center flex-items-center flex-md-items-start pl-md-4">
    <h1 class="text-normal lh-condensed">{{ project.name }}</h1>
    <p class="h4 text-gray text-normal mb-2">{{ project.description }}</p>
    <a class="text-gray text-small" href="{{ project.web_url }}">{{ project.web_url }}</a>
  </div>
  <!-- <a href="{{ project.web_url }}" class="github-component position-relative hover-grow height-full no-underline d-flex flex-column flex-justify-center text-center border border-gray-light rounded-1 bg-gray p-5">
    <p class="f3 lh-condensed text-center link-gray-dark mb-0 mt-1">{{ project.name }}</p>
    {% if project.description %}
      <p class="f5 text-gray text-center mb-0 mt-1">{{ project.description }}</p>
    {% endif %}
  </a> -->
{% else %}
  <div class="github-component position-relative height-full text-center border border-gray-light rounded-1 bg-gray p-5">
    <p class="f3 lh-condensed text-center mb-0 mt-1">{{ project.name }}</p>
    {% if project.description %}
      <p class="f5 text-gray text-center mb-0 mt-1">{{ project.description }}</p>
    {% endif %}
  </div>
{% endif %}
